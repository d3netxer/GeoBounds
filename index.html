<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B7DKVPT762"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-B7DKVPT762');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounding Box Map</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Terra Draw Core -->
  <script src="https://unpkg.com/terra-draw@1.6.1/dist/terra-draw.umd.js"></script>
  <!-- Terra Draw Leaflet Adapter -->
  <script src="https://unpkg.com/terra-draw-leaflet-adapter@1.0.3/dist/terra-draw-leaflet-adapter.umd.js"></script>

  <link rel="stylesheet" href="style.css?v=4">
</head>

<body>
  <div id="app-container">
    <header class="app-header">
      <h1>GeoBounds</h1>
      <p>Draw shapes on the map to capture their coordinates instantly in various formats.</p>
    </header>

    <div id="map-container">
      <div id="map"></div>

      <div id="terra-toolbar" class="glass-panel" style="position: absolute; left: 1rem; top: 1rem; transform: none; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem; width: auto; max-width: none; z-index: 1000; bottom: auto;">
        <button class="tool-btn" data-mode="rectangle" title="Draw Bounding Box">◻</button>
        <button class="tool-btn" data-mode="polygon" title="Draw Polygon">⬡</button>
        <button class="tool-btn" data-mode="linestring" title="Draw Line">╱</button>
        <button class="tool-btn" data-mode="point" title="Draw Point">📍</button>
        <button class="tool-btn" id="clear-map-btn" title="Clear Map">🗑</button>
      </div>

      <div id="search-panel" class="glass-panel search-panel">
        <input type="text" id="search-input" placeholder="Search for a place...">
        <button id="search-btn" class="glow-btn">Search</button>
      </div>

      <div id="cursor-tooltip" style="display: none; position: fixed; pointer-events: none; z-index: 9999; background: rgba(0, 0, 0, 0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; white-space: nowrap; transform: translate(15px, 15px);">Click and drag to draw rectangle</div>


      <div id="toast-notification" style="display: none; position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 2000; padding: 0.5rem 1rem; background: rgba(0, 0, 0, 0.75); color: #e5e5ea; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; font-weight: 400; font-size: 0.85rem; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); pointer-events: none; transition: opacity 0.3s ease;">
        <span style="color: #ff9f0a; margin-right: 6px;">●</span> Maximum limit of 3 shapes reached
      </div>

      <div id="geometry-output-container" style="position: absolute; bottom: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.5rem; justify-content: flex-end; z-index: 1000; max-height: calc(100vh - 2rem); pointer-events: none;">
        
        <!-- Individual Geometry Cards will be injected here -->
        <div id="geometry-cards-wrapper" style="display: flex; flex-direction: column; gap: 0.5rem; pointer-events: auto;">
          <!-- Placeholder if empty -->
          <div class="glass-panel geometry-card placeholder-card">
            <div class="panel-content" style="padding: 1rem;">
              <p class="placeholder-text" id="coord-placeholder" style="margin: 0;">Draw on the map to see coordinates.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js?v=1006"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounding Box Map</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Leaflet Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Leaflet Draw -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <header class="app-header">
      <h1>GeoBounds</h1>
      <p>Draw a bounding box to capture coordinates instantly.</p>
    </header>
    
    <div id="map-container">
      <div id="map"></div>
      
      <div id="coordinates-panel" class="glass-panel">
        <div class="panel-header">
          <h3>Bounding Box Output</h3>
        </div>
        <div class="panel-content">
          <p class="placeholder-text" id="coord-placeholder">Select the rectangle tool (top right) and draw on the map.</p>
          <div class="coord-output hidden" id="coord-output">
            <p class="format-label">Format: (xmin, ymin, xmax, ymax) / (lon_min, lat_min, lon_max, lat_max)</p>
            <code><span id="min-x">0.0</span>, <span id="min-y">0.0</span>, <span id="max-x">0.0</span>, <span id="max-y">0.0</span></code>
            <button id="copy-btn" class="glow-btn">Copy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
